<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: transparent;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: system-ui, sans-serif;
        }
        #bilde-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
            height: 100%;
            padding: 0.5rem;
        }
        img {
            max-width: 100%;
            max-height: calc(100vh - 3rem);
            object-fit: contain;
            border-radius: 4px;
        }
        .kreditt {
            font-size: 0.7rem;
            color: #888;
            text-align: center;
        }
        .kreditt a { color: #888; }
        .ingen-bilde {
            color: #888;
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="bilde-container">
        <p class="ingen-bilde" id="melding">⏳ Henter bilde...</p>
    </div>
    <script>
        const scientificName = "{{ scientific_name }}".replace(/ /g, "_");

        async function hentBilde() {
            const container = document.getElementById("bilde-container");

            if (!scientificName) {
                container.innerHTML = '<p class="ingen-bilde">Ingen art valgt</p>';
                return;
            }

            try {
                const resp = await fetch(
                    `https://en.wikipedia.org/api/rest_v1/page/summary/${scientificName}`
                );
                const data = await resp.json();

                if (data.thumbnail) {
                    container.innerHTML = `
                        <img src="${data.thumbnail.source}" alt="${scientificName}">
                        <p class="kreditt">
                            📷 <a href="${data.content_urls?.desktop?.page || '#'}" 
                               target="_blank">Wikipedia</a>
                        </p>`;
                } else {
                    container.innerHTML = '<p class="ingen-bilde">Ingen bilde tilgjengelig</p>';
                }
            } catch (e) {
                container.innerHTML = '<p class="ingen-bilde">Kunne ikke hente bilde</p>';
            }
        }

        hentBilde();
    </script>
</body>
</html>
